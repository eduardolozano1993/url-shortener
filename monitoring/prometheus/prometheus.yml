global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend-1:4000
          - backend-2:4000

  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - analytics-service:4100
