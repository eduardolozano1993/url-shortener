x-backend-common: &backend-common
  image: url-shortener-backend:latest
  build:
    context: ./backend
  depends_on:
    db-primary:
      condition: service_healthy
    db-replica:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrator:
      condition: service_completed_successfully
  environment:
    PORT: 4000
    PUBLIC_BASE_URL: ${LOAD_BALANCER_PUBLIC_BASE_URL:-http://localhost:4000/}
    PGHOST: db-primary
    PGPORT: 5432
    PGDATABASE: ${PGDATABASE:-url_shortener}
    PGUSER: ${PGUSER:-postgres}
    PGPASSWORD: ${PGPASSWORD:-postgres}
    PGREPLICA_HOST: db-replica
    PGREPLICA_PORT: 5432
    PGREPLICA_DATABASE: ${PGREPLICA_DATABASE:-url_shortener}
    PGREPLICA_USER: ${PGREPLICA_USER:-postgres}
    PGREPLICA_PASSWORD: ${PGREPLICA_PASSWORD:-postgres}
    REPLICA_SYNC_DELAY_MS: ${REPLICA_SYNC_DELAY_MS:-0}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    REDIS_TTL_SECONDS: ${REDIS_TTL_SECONDS:-3600}
  restart: unless-stopped

services:
  db-primary:
    image: postgres:16
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-url_shortener}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-url_shortener}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-replica:
    image: postgres:16
    environment:
      POSTGRES_USER: ${PGREPLICA_USER:-postgres}
      POSTGRES_PASSWORD: ${PGREPLICA_PASSWORD:-postgres}
      POSTGRES_DB: ${PGREPLICA_DATABASE:-url_shortener}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${PGREPLICA_PORT:-5433}:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PGREPLICA_USER:-postgres} -d ${PGREPLICA_DATABASE:-url_shortener}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrator:
    image: url-shortener-backend:latest
    build:
      context: ./backend
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    environment:
      PORT: 4000
      PGHOST: db-primary
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-url_shortener}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      PGREPLICA_HOST: db-replica
      PGREPLICA_PORT: 5432
      PGREPLICA_DATABASE: ${PGREPLICA_DATABASE:-url_shortener}
      PGREPLICA_USER: ${PGREPLICA_USER:-postgres}
      PGREPLICA_PASSWORD: ${PGREPLICA_PASSWORD:-postgres}
    command: ["npm", "run", "db:migrate"]

  backend-1:
    <<: *backend-common

  backend-2:
    <<: *backend-common

  load-balancer:
    image: nginx:1.27-alpine
    depends_on:
      - backend-1
      - backend-2
    ports:
      - "${LOAD_BALANCER_PORT:-4000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/load-balancer.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - load-balancer
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_data:
